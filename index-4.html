/* CURSOR */

/* GRAIN */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:998;opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;animation:grain 1.2s steps(2) infinite;
}
@keyframes grain{0%,100%{transform:translate(0,0)}10%{transform:translate(-1%,-1%)}20%{transform:translate(1%,1%)}30%{transform:translate(-1%,1%)}40%{transform:translate(1%,-1%)}50%{transform:translate(-2%,0)}60%{transform:translate(2%,0)}70%{transform:translate(0,-2%)}80%{transform:translate(0,2%)}90%{transform:translate(-1%,0)}}

<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ── CURSOR ── */
(function(){
  let mx=0,my=0,rx=0,ry=0;
  const dot=document.getElementById('cur'),ring=document.getElementById('curRing'),ringEl=document.getElementById('curRingEl');
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.transform=`translate(${mx}px,${my}px)`;});
  (function animRing(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.transform=`translate(${rx}px,${ry}px)`;requestAnimationFrame(animRing);})();
  document.addEventListener('mouseover',e=>{if(e.target.matches('a,button,[data-hover]'))ringEl.classList.add('big');else ringEl.classList.remove('big');});
})();

/* ── PARTICLE CANVAS ── */
function ParticleField(){
  const cv=useRef();
  useEffect(()=>{
    const c=cv.current,ctx=c.getContext('2d');
    let W,H,pts=[],mouse={x:-999,y:-999},raf;
    const N=70;
    const resize=()=>{W=c.width=innerWidth;H=c.height=innerHeight;};
    const init=()=>{pts=Array.from({length:N},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.22,r:Math.random()*1.8+.8,o:Math.random()*.5+.15,p:Math.random()*Math.PI*2,ps:.012+Math.random()*.015}));};
    document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
    const draw=()=>{
      ctx.clearRect(0,0,W,H);
      pts.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;p.p+=p.ps;
        const dx=mouse.x-p.x,dy=mouse.y-p.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){const f=(120-d)/120*.008;p.vx+=dx*f;p.vy+=dy*f;}
        p.vx*=.998;p.vy*=.998;
        if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
        const sc=1+Math.sin(p.p)*.3;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r*sc,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,92,53,${p.o*(1+Math.sin(p.p)*.4)})`;ctx.fill();
      });
      for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
        const a=pts[i],b=pts[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<110){
          ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
          ctx.strokeStyle=`rgba(255,92,53,${(1-d/110)*.08})`;ctx.lineWidth=.6;ctx.stroke();
        }
      }
      raf=requestAnimationFrame(draw);
    };
    resize();init();draw();
    window.addEventListener('resize',()=>{resize();init();});
    return()=>{cancelAnimationFrame(raf);};
  },[]);
  return <canvas ref={cv} style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,opacity:.7}}/>;
}

/* ── HOOKS ── */
function useReveal(threshold=.1){
  const ref=useRef();const[v,setV]=useState(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setV(true);obs.disconnect();}},{threshold});
    if(ref.current)obs.observe(ref.current);
    return()=>obs.disconnect();
  },[]);
  return[ref,v];
}

function useCounter(target,duration=2000,start=false){
  const[val,setVal]=useState(0);
  useEffect(()=>{
    if(!start)return;
    let s=0,st=null;
    const step=()=>{s+=target/(duration/16);if(s>=target){setVal(target);return;}setVal(Math.floor(s));st=requestAnimationFrame(step);};
    st=requestAnimationFrame(step);
    return()=>cancelAnimationFrame(st);
  },[start,target,duration]);
  return val;
}

/* ── REVEAL ── */
function R({children,delay=0,y=32,x=0,style={}}){
  const[ref,v]=useReveal();
  return(
    <div ref={ref} style={{opacity:v?1:0,transform:v?'none':`translate(${x}px,${y}px)`,transition:`opacity .75s cubic-bezier(.16,1,.3,1) ${delay}s, transform .75s cubic-bezier(.16,1,.3,1) ${delay}s`,...style}}>
      {children}
    </div>
  );
}

/* ── NAV ── */
function Nav({page,go}){

  useEffect(()=>{const h=()=>setS(scrollY>60);window.addEventListener('scroll',h);return()=>window.removeEventListener('scroll',h);},[]);
  return(
    <nav style={{position:'fixed',top:0,left:0,right:0,zIndex:900,height:64,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 clamp(1.5rem,5%,4rem)',background:s?'rgba(5,5,8,.96)':'transparent',backdropFilter:s?'blur(24px)':'none',borderBottom:s?'1px solid rgba(255,255,255,.06)':'none',transition:'all .4s'}}>
      <div onClick={()=>go('home')} data-hover style={{fontFamily:'var(--fd)',fontSize:'1.3rem',letterSpacing:'.08em',color:'var(--ink)',cursor:'pointer',display:'flex',alignItems:'center',gap:'.5rem'}}>
        <span style={{width:8,height:8,borderRadius:'50%',background:'var(--fire)',boxShadow:'0 0 10px var(--fire)',display:'inline-block',animation:'pulse 2s infinite'}}/>
        FRED<span style={{color:'var(--fire)'}}>.</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:'.15rem'}}>
        {[['home','ACCUEIL'],['projets','PROJETS'],['moi','À PROPOS']].map(([id,l])=>(
          <div key={id} onClick={()=>go(id)} data-hover style={{padding:'.4rem .9rem',borderRadius:6,fontFamily:'var(--fm)',fontSize:'.72rem',letterSpacing:'.12em',color:page===id?'var(--fire)':'var(--ghost2)',background:page===id?'rgba(255,92,53,.08)':'transparent',cursor:'pointer',transition:'all .2s'}}>{l}</div>
        ))}
        <div onClick={()=>go('moi','contact')} data-hover style={{marginLeft:'.6rem',padding:'.42rem 1.2rem',borderRadius:6,background:'var(--fire)',color:'#050508',fontFamily:'var(--fm)',fontSize:'.72rem',letterSpacing:'.1em',fontWeight:700,cursor:'pointer',boxShadow:'0 0 24px rgba(255,92,53,.3)',transition:'all .22s'}}>
          CONTACT
        </div>
      </div>
      <style>{`@keyframes pulse{0%,100%{box-shadow:0 0 10px var(--fire)}50%{box-shadow:0 0 20px var(--fire),0 0 40px rgba(255,92,53,.3)}}`}</style>
    </nav>
  );
}

/* ── MARQUEE ── */
function Marquee(){
  const items=['Make.com','n8n','Telegram API','Webhooks','LinkedIn API','Groq IA','Notion','Google Workspace','WhatsApp API','REST API'];
  const repeated=[...items,...items];
  return(
    <div style={{overflow:'hidden',borderTop:'1px solid var(--wire)',borderBottom:'1px solid var(--wire)',padding:'.7rem 0',background:'var(--deep)',position:'relative',zIndex:1}}>
      <div style={{display:'flex',gap:'3rem',animation:'marquee 22s linear infinite',width:'max-content'}}>
        {repeated.map((t,i)=>(
          <span key={i} style={{fontFamily:'var(--fm)',fontSize:'.68rem',letterSpacing:'.14em',color:'var(--ghost)',textTransform:'uppercase',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:'.7rem'}}>
            <span style={{width:4,height:4,borderRadius:'50%',background:'var(--fire)',display:'inline-block'}}/>
            {t}
          </span>
        ))}
      </div>
      <style>{`@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}`}</style>
    </div>

}

/* ── LIVE TERMINAL ── */
function LiveTerminal(){
  const lines=[
    {t:800,  text:'$ make scenario --name="linkedin_bot"',c:'var(--fire)'},
    {t:1600, text:'> Connecting to Notion API... ✓',c:'var(--lime)'},
    {t:2400, text:'> Fetching entries with status="À générer"',c:'var(--ghost2)'},
    {t:3200, text:'> Found 3 entries. Processing...',c:'var(--ghost2)'},
    {t:4000, text:'> Groq AI generating post [1/3]... ✓',c:'var(--lime)'},
    {t:4800, text:'> Groq AI generating post [2/3]... ✓',c:'var(--lime)'},
    {t:5600, text:'> Groq AI generating post [3/3]... ✓',c:'var(--lime)'},
    {t:6400, text:'> LinkedIn API publishing scheduled posts...',c:'var(--ghost2)'},
    {t:7200, text:'> 3/3 posts published successfully ✓',c:'var(--lime)'},
    {t:8000, text:'> Updating Notion status to "Publié"...',c:'var(--ghost2)'},
    {t:8800, text:'✓ Workflow complete. Next run: tomorrow 21:00',c:'var(--fire)'},
  ];
  const[shown,setShown]=useState([]);
  const[active,setActive]=useState(true);
  const[ref,v]=useReveal();
  useEffect(()=>{
    if(!v)return;
    setShown([]);setActive(true);
    const timers=lines.map(l=>setTimeout(()=>setShown(p=>[...p,l]),l.t));
    const done=setTimeout(()=>{setActive(false);},9500);
    return()=>{timers.forEach(clearTimeout);clearTimeout(done);};
  },[v]);
  return(
    <div ref={ref} style={{background:'var(--void)',border:'1px solid var(--wire2)',borderRadius:14,overflow:'hidden',fontFamily:'var(--fm)',fontSize:'.76rem'}}>
      <div style={{background:'var(--raised)',padding:'.65rem 1.1rem',display:'flex',alignItems:'center',gap:'.55rem',borderBottom:'1px solid var(--wire)'}}>
        {['#FF5F57','#FEBC2E','#28C840'].map((c,i)=><div key={i} style={{width:11,height:11,borderRadius:'50%',background:c}}/>)}
        <span style={{marginLeft:'.5rem',color:'var(--ghost)',fontSize:'.65rem',letterSpacing:'.06em'}}>fred_mourad — automation_engine</span>
        <div style={{marginLeft:'auto',width:7,height:7,borderRadius:'50%',background:active?'var(--lime)':'var(--ghost)',boxShadow:active?'0 0 8px var(--lime)':'none',transition:'all .3s'}}/>
      </div>
      <div style={{padding:'1.2rem 1.4rem',minHeight:260,position:'relative'}}>
        {shown.map((l,i)=>(
          <div key={i} style={{color:l.c,lineHeight:1.85,animation:'fadeUp .35s ease'}}>
            {l.text}
          </div>
        ))}
        {active&&<span style={{display:'inline-block',width:7,height:13,background:'var(--fire)',verticalAlign:'middle',animation:'blink 1s infinite',marginLeft:2}}/>}
        <style>{`
          @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
          @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
        `}</style>
      </div>
    </div>
  );
}

/* ── WORKFLOW SVG CARD ── */
function WorkflowSVG(){
  const nodes=[
    {x:80,y:44,label:'Schedule',sub:'21:00',icon:'📅',c:'#FF5C35'},
    {x:80,y:130,label:'Notion DB',sub:'Read rows',icon:'🗄️',c:'#00CFFF'},
    {x:80,y:216,label:'Groq AI',sub:'Generate',icon:'🤖',c:'#B06EFF'},
    {x:80,y:302,label:'LinkedIn',sub:'Publish',icon:'💼',c:'#2DFF8F'},
  ];
  const[progress,setProgress]=useState(0);
  const[ref,v]=useReveal();
  useEffect(()=>{
    if(!v)return;
    let p=0,raf;
    const animate=()=>{p+=.008;if(p>1)p=0;setProgress(p);raf=requestAnimationFrame(animate);};
    raf=requestAnimationFrame(animate);
    return()=>cancelAnimationFrame(raf);
  },[v]);
  const activeNode=Math.floor(progress*4)%4;
  return(
    <div ref={ref} style={{background:'var(--surface)',border:'1px solid var(--wire2)',borderRadius:14,padding:'1.5rem',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse 80% 60% at 90% 10%, rgba(255,92,53,.06) 0%, transparent 60%)',pointerEvents:'none'}}/>
      <div style={{fontFamily:'var(--fm)',fontSize:'.67rem',color:'var(--ghost)',letterSpacing:'.08em',marginBottom:'1.2rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>// linkedin_content.make</span>
        <span style={{color:'var(--lime)',display:'flex',alignItems:'center',gap:'.35rem'}}>
          <span style={{width:5,height:5,borderRadius:'50%',background:'var(--lime)',animation:'pulse2 1.5s infinite',display:'inline-block'}}/>
          RUNNING
        </span>
      </div>
      <div style={{display:'flex',gap:'1.5rem',alignItems:'stretch'}}>
        {/* SVG connector */}
        <svg width="24" height="346" style={{flexShrink:0,marginTop:8}}>
          <defs>
            <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#FF5C35" stopOpacity=".8"/>
              <stop offset="100%" stopColor="#2DFF8F" stopOpacity=".8"/>
            </linearGradient>
            <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
          </defs>
          {/* track */}
          <line x1="12" y1="48" x2="12" y2="298" stroke="rgba(255,255,255,.07)" strokeWidth="1.5" strokeDasharray="4 4"/>
          {/* animated dot */}
          <circle cx="12" cy={48+progress*250} r="4" fill="var(--fire)" filter="url(#glow)" opacity={progress>0?1:0}/>
          {/* node dots */}
          {nodes.map((n,i)=>(
            <circle key={i} cx="12" cy={n.y} r={activeNode===i?6:4} fill={activeNode===i?n.c:'var(--raised)'} stroke={n.c} strokeWidth={activeNode===i?0:1.5} style={{transition:'all .3s'}}/>
          ))}
        </svg>
        {/* nodes */}
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:'.55rem'}}>
          {nodes.map((n,i)=>(
            <div key={i} style={{background:activeNode===i?'var(--float)':'var(--raised)',border:`1px solid ${activeNode===i?n.c+'44':'var(--wire)'}`,borderRadius:9,padding:'.6rem .85rem',display:'flex',alignItems:'center',gap:'.6rem',transition:'all .3s',boxShadow:activeNode===i?`0 0 20px ${n.c}22`:' none'}}>
              <div style={{width:28,height:28,borderRadius:7,background:`${n.c}18`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.85rem',flexShrink:0}}>{n.icon}</div>
              <div>
                <div style={{fontFamily:'var(--fm)',fontSize:'.72rem',color:activeNode===i?'var(--ink)':'var(--ghost2)',transition:'color .3s'}}>{n.label}</div>
                <div style={{fontFamily:'var(--fm)',fontSize:'.6rem',color:'var(--ghost)',marginTop:'.05rem'}}>{n.sub}</div>
              </div>
              {activeNode===i&&<div style={{marginLeft:'auto',width:6,height:6,borderRadius:'50%',background:n.c,boxShadow:`0 0 8px ${n.c}`}}/>}
            </div>
          ))}
        </div>
      </div>
      <div style={{marginTop:'1.1rem',paddingTop:'1rem',borderTop:'1px solid var(--wire)',display:'flex',gap:'.4rem',flexWrap:'wrap'}}>
        {[['Make.com','#FF5C35'],['Notion','#00CFFF'],['Groq','#B06EFF'],['LinkedIn','#2DFF8F']].map(([t,c])=>(
          <span key={t} style={{fontFamily:'var(--fm)',fontSize:'.63rem',padding:'.18rem .5rem',borderRadius:4,background:`${c}12`,border:`1px solid ${c}28`,color:c}}>{t}</span>
        ))}
      </div>
      <style>{`@keyframes pulse2{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}`}</style>
    </div>
  );
}

/* ── STAT COUNTER ── */

  const[ref,v]=useReveal();
  const n=useCounter(parseInt(value)||0,1800,v);
  return(
    <div ref={ref} style={{opacity:v?1:0,transform:v?'none':'translateY(20px)',transition:`all .7s cubic-bezier(.16,1,.3,1) ${delay}s`,textAlign:'center'}}>
      <div style={{fontFamily:'var(--fd)',fontSize:'clamp(2.8rem,5vw,4.2rem)',letterSpacing:'.04em',lineHeight:1,color:'var(--ink)'}}>
        {typeof value==='string'&&isNaN(parseInt(value))?value:<>{n}<span style={{color:'var(--fire)'}}>{suffix}</span></>}
      </div>
      <div style={{fontFamily:'var(--fm)',fontSize:'.65rem',color:'var(--ghost)',letterSpacing:'.12em',textTransform:'uppercase',marginTop:'.4rem'}}>{label}</div>
    </div>
  );
}

/* ── PROJECT CARD ── */
function ProjectCard({num,icon,icoBg,title,desc,points,tags,url,scenName,stats,accent,btnLabel}){
  const[h,setH]=useState(false);
  return(
    <div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{background:'var(--surface)',border:`1px solid ${h?accent+'33':'var(--wire)'}`,borderRadius:16,overflow:'hidden',transition:'border-color .3s, box-shadow .3s',boxShadow:h?`0 24px 60px rgba(0,0,0,.6), 0 0 40px ${accent}0A`:'none'}}>
      <div style={{height:3,background:`linear-gradient(90deg,${accent},${accent}44,transparent)`}}/>

function ContactForm(){
  const[form,setForm]=useState({name:'',email:'',whatsapp:'',service:'',msg:''});

    setLoading(true);
    const txt=`Bonjour Fred,\n\nJe m'appelle ${form.name}${form.email?` (${form.email})`:''}.\n${form.service?`\nService souhaité : ${form.service}\n`:''}\n${form.msg}${form.whatsapp?`\n\nMon WhatsApp : ${form.whatsapp}`:''}`.trim();
    setTimeout(()=>{setLoading(false);setSent(true);window.open(`https://wa.me/22901052502827?text=${encodeURIComponent(txt)}`,'_blank');},800);
  };
  if(sent)return(
    <div style={{background:'var(--surface)',border:'1px solid var(--wire2)',borderRadius:16,padding:'3rem',textAlign:'center'}}>

      <button onClick={()=>{setSent(false);setForm({name:'',email:'',whatsapp:'',service:'',msg:''}); }} data-hover style={{background:'transparent',border:'1px solid var(--wire2)',borderRadius:8,color:'var(--ghost2)',padding:'.5rem 1.2rem',cursor:'pointer',fontFamily:'var(--fm)',fontSize:'.75rem',letterSpacing:'.08em'}}>NOUVEAU MESSAGE</button>

  );

        <div style={{fontFamily:'var(--fd)',fontSize:'1.4rem',letterSpacing:'.06em',lineHeight:1.2}}>ENVOIE-MOI UN MESSAGE <span style={{color:'var(--fire)'}}>DIRECT</span></div>
        <p style={{color:'var(--ghost2)',fontSize:'.81rem',marginTop:'.5rem',lineHeight:1.7}}>Le formulaire prépare un message WhatsApp — tu l'envoies en un clic.</p>
      </div>
      <div style={{padding:'1.8rem 2rem'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.9rem',marginBottom:'.9rem'}}>
          {[['Ton nom *','Ex: Axel','name','text'],['Email','ton@email.com','email','email']].map(([l,ph,k,t])=>(

              <div style={{fontFamily:'var(--fm)',fontSize:'.62rem',color:'var(--ghost2)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:'.38rem'}}>{l}</div>
              <input type={t} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} placeholder={ph}

          ))}
        </div>
        <div style={{marginBottom:'.9rem'}}>
